[build]
builder = "nixpacks"

[phases.build]
cmds = [
  "npm install",
  "npm run build",
  "cd backend && npm install"
]

[deploy]
startCommand = "cd backend && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"