services:
  - type: web
    name: artfolio
    runtime: node
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:./artfolio.db
      - key: JWT_SECRET
        generateValue: true
      # Ajouter manuellement dans le dashboard :
      # - STRIPE_SECRET_KEY
      # - STRIPE_PUBLISHABLE_KEY  
      # - STRIPE_WEBHOOK_SECRET
      # - OPENAI_API_KEY
